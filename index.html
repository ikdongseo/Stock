<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFIT Stock · 기업 분석 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #262a33;
    --text: #e8e9ec;
    --muted: #8b909c;
    --up: #e5484d;
    --down: #3b82f6;
    --accent: #d4a94b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  }
  header {
    padding: 24px 20px 12px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  header .sub {
    color: var(--muted);
    font-size: 13px;
    margin-top: 4px;
  }
  #code-input {
    margin-top: 12px;
    display: flex;
    gap: 8px;
  }
  #code-input input {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    flex: 1;
  }
  #code-input button {
    background: var(--accent);
    color: #1a1a1a;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
  }
  main {
    padding: 16px;
    max-width: 720px;
    margin: 0 auto;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }
  .card .label {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 6px;
  }
  .card .value {
    font-size: 22px;
    font-weight: 700;
  }
  .card .value.up { color: var(--up); }
  .card .value.down { color: var(--down); }
  .score-card {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .score-badge {
    font-size: 32px;
    font-weight: 800;
    color: var(--accent);
  }
  section.panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  section.panel h2 {
    font-size: 14px;
    margin: 0 0 12px;
    color: var(--muted);
    font-weight: 600;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: right; padding: 6px 4px; border-bottom: 1px solid var(--border); }
  th:first-child, td:first-child { text-align: left; color: var(--muted); }
  .disclosure-item {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .disclosure-item a { color: var(--text); text-decoration: none; }
  .disclosure-item .date { color: var(--muted); flex-shrink: 0; margin-left: 8px; }
  .note {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.5;
  }
  #status { color: var(--muted); font-size: 13px; padding: 40px 16px; text-align: center; }
  .week52-bar {
    position: relative;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    margin: 12px 0 6px;
  }
  .week52-bar .dot {
    position: absolute;
    top: -4px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    transform: translateX(-50%);
    border: 2px solid var(--panel);
  }
  .week52-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
  }
  .peer-table-title {
    font-size: 12px;
    color: var(--muted);
    margin: 14px 0 6px;
  }
  .peer-table-title:first-child { margin-top: 0; }
  .score-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .score-mini-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 6px;
    text-align: center;
  }
  .score-mini-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .score-mini-value {
    font-size: 24px;
    font-weight: 800;
    color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <h1>CFIT Stock</h1>
  <div class="sub">DART 공시 + 증권가 컨센서스 기반 기업 분석</div>
  <div id="code-input">
    <input id="stockCode" list="companyList" placeholder="종목명 또는 종목코드 (예: 삼성전자)" value="삼성전자">
    <datalist id="companyList"></datalist>
    <button onclick="load()">조회</button>
  </div>
</header>

<main id="app">
  <div id="status">종목코드를 입력하고 조회를 눌러주세요.</div>
</main>

<script>
const API_BASE = 'https://cfit-stock-api.onrender.com';
let nameToCode = {};

async function loadCompanyIndex() {
  try {
    const res = await fetch(`${API_BASE}/api/companies`);
    if (!res.ok) return;
    const list = await res.json();
    const datalist = document.getElementById('companyList');
    datalist.innerHTML = list.map(c => `<option value="${c.name}">`).join('');
    nameToCode = Object.fromEntries(list.map(c => [c.name, c.code]));
  } catch (e) {
    // 이름 검색 인덱스가 없어도 종목코드 직접 입력은 계속 동작
  }
}

async function load() {
  const input = document.getElementById('stockCode').value.trim();
  const code = nameToCode[input] || input;
  const app = document.getElementById('app');
  app.innerHTML = '<div id="status">불러오는 중... (서버가 잠시 쉬고 있었다면 최대 1분 정도 걸릴 수 있어요)</div>';

  try {
    const res = await fetch(`${API_BASE}/api/stock/${code}`);
    if (!res.ok) {
      let msg = '데이터를 불러오지 못했습니다.';
      try {
        const err = await res.json();
        if (err.detail) msg = err.detail;
      } catch (e) { /* 파싱 실패 시 기본 메시지 사용 */ }
      throw new Error(msg);
    }
    const d = await res.json();
    render(d);
  } catch (e) {
    app.innerHTML = `<div id="status">${e.message}</div>`;
  }
}

function render(d) {
  const app = document.getElementById('app');
  const price = d.price || {};
  const consensus = d.consensus || {};
  const fv = d.forward_valuation || {};
  const scores = d.scores || {};
  const targetUpside = (scores.long_term || {}).factors?.target_upside_pct
    ?? (scores.mid_term || {}).factors?.target_upside_pct;
  const upDown = (price.prev_diff || 0) >= 0 ? 'up' : 'down';

  app.innerHTML = `
    <div class="grid">
      <div class="card">
        <div class="label">${d.corp_name || d.stock_code} 현재가</div>
        <div class="value ${upDown}">${price.current_price ? price.current_price.toLocaleString() + '원' : '-'}</div>
      </div>
      <div class="card">
        <div class="label">증권가 목표주가</div>
        <div class="value">${consensus.target_price ? consensus.target_price.toLocaleString() + '원' : '-'}</div>
      </div>
      <div class="card">
        <div class="label">Forward PER</div>
        <div class="value">${fv.forward_per ?? '-'}</div>
      </div>
      <div class="card">
        <div class="label">목표주가 괴리율</div>
        <div class="value">${targetUpside != null ? targetUpside + '%' : '-'}</div>
      </div>
    </div>

    <section class="panel">
      <h2>매매 타점 스코어 (단기/중기/장기, 참고용)</h2>
      <div id="scoresSection"></div>
    </section>

    <section class="panel">
      <h2>기술적 지표 (단기)</h2>
      <div id="technicalSection"></div>
    </section>

    <section class="panel">
      <h2>수급 동향 (중기, 최근 5거래일)</h2>
      <div id="supplyDemandSection"></div>
    </section>

    <section class="panel">
      <h2>연도별 실적 추이</h2>
      <table id="finTable"></table>
      <canvas id="growthChart" height="140"></canvas>
    </section>

    <section class="panel">
      <h2>52주 밴드 내 위치</h2>
      <div id="week52Section"></div>
    </section>

    <section class="panel">
      <h2>동종업계 PER 비교</h2>
      <div class="peer-table-title">국내 (자동 분류)</div>
      <table id="domesticPeerTable"></table>
      <div class="peer-table-title">미국 (참고용, 회계기준·금리환경 다름)</div>
      <table id="usPeerTable"></table>
    </section>

    <section class="panel">
      <h2>최근 공시</h2>
      <div id="disclosureList"></div>
    </section>

    <div class="note">업데이트: ${d.updated_at ? new Date(d.updated_at).toLocaleString('ko-KR') : '-'}</div>
  `;

  renderScores(scores);
  renderTechnical(d.technical || {});
  renderSupplyDemand(d.supply_demand || {});
  renderFinTable(d.financials_yearly || []);
  renderChart(d.financials_yearly || []);
  renderWeek52(d.week52 || {}, price.current_price, d.consensus || {});
  renderPeerTable('domesticPeerTable', (d.sector_comparison || {}).domestic, d.corp_name, price.current_price ? fv.forward_per : null, true);
  renderPeerTable('usPeerTable', (d.sector_comparison || {}).us, null, null, false);
  renderDisclosures(d.recent_disclosures || []);
}

function renderFinTable(series) {
  const table = document.getElementById('finTable');
  const rows = ['연도', '매출액', '영업이익', '당기순이익'];
  let html = '<tr>' + rows.map(r => `<th>${r}</th>`).join('') + '</tr>';
  series.forEach(row => {
    html += `<tr>
      <td>${row.year}</td>
      <td>${fmtEok(row['매출액'])}</td>
      <td>${fmtEok(row['영업이익'])}</td>
      <td>${fmtEok(row['당기순이익'])}</td>
    </tr>`;
  });
  table.innerHTML = html;
}

function fmtEok(v) {
  if (v == null) return '-';
  return (v / 100000000).toLocaleString(undefined, {maximumFractionDigits: 0}) + '억';
}

function renderChart(series) {
  const ctx = document.getElementById('growthChart');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: series.map(s => s.year),
      datasets: [
        { label: '매출액', data: series.map(s => s['매출액']), backgroundColor: '#d4a94b' },
        { label: '영업이익', data: series.map(s => s['영업이익']), backgroundColor: '#3b82f6' },
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#e8e9ec' } } },
      scales: {
        x: { ticks: { color: '#8b909c' }, grid: { color: '#262a33' } },
        y: { ticks: { color: '#8b909c' }, grid: { color: '#262a33' } },
      }
    }
  });
}

function renderWeek52(week52, currentPrice, consensus) {
  const el = document.getElementById('week52Section');
  const pct = week52.position_pct;
  const low = consensus.week52_low, high = consensus.week52_high;
  if (pct == null || low == null || high == null) {
    el.innerHTML = '<div class="note">52주 데이터 없음</div>';
    return;
  }
  const clamped = Math.max(0, Math.min(100, pct));
  el.innerHTML = `
    <div class="week52-bar"><div class="dot" style="left:${clamped}%"></div></div>
    <div class="week52-labels">
      <span>52주 최저 ${low.toLocaleString()}원</span>
      <span>52주 최고 ${high.toLocaleString()}원</span>
    </div>
    <div class="note">현재가는 52주 밴드 내 ${pct}% 지점 (0%=최저, 100%=최고)</div>
  `;
}

function renderPeerTable(elementId, peerData, ownName, ownForwardPer, isDomestic) {
  const table = document.getElementById(elementId);
  if (!peerData || !peerData.peers || !peerData.peers.length) {
    table.innerHTML = `<tr><td class="note">${(peerData && peerData.note) || '데이터 없음'}</td></tr>`;
    return;
  }
  let html = '<tr><th>종목</th><th>PER</th><th>추정PER</th></tr>';
  peerData.peers.forEach(p => {
    const name = p.name || p.ticker;
    const per = p.per != null ? p.per.toFixed(2) : '-';
    const fwd = p.forward_per != null ? p.forward_per.toFixed(2) : '-';
    html += `<tr><td>${name}</td><td>${per}</td><td>${fwd}</td></tr>`;
  });
  table.innerHTML = html;
}

function renderScores(scores) {
  const el = document.getElementById('scoresSection');
  const items = [
    { key: 'short_term', label: '단기 (며칠~몇 주)' },
    { key: 'mid_term', label: '중기 (몇 주~1분기)' },
    { key: 'long_term', label: '장기 (분기~년)' },
  ];
  el.innerHTML = `
    <div class="score-grid">
      ${items.map(item => {
        const s = scores[item.key] || {};
        const val = s.score != null ? s.score : '-';
        return `
          <div class="score-mini-card">
            <div class="score-mini-label">${item.label}</div>
            <div class="score-mini-value">${val}</div>
          </div>
        `;
      }).join('')}
    </div>
    <div class="note">점수만 제공하며 매수/매도 판단은 직접 하셔야 합니다. 기준점 50, 범위 0~100.</div>
  `;
}

function renderTechnical(technical) {
  const el = document.getElementById('technicalSection');
  if (technical.error) {
    el.innerHTML = `<div class="note">${technical.error}</div>`;
    return;
  }
  const macd = technical.macd || {};
  el.innerHTML = `
    <table>
      <tr><td>이동평균 배열</td><td>${technical.ma_alignment ?? '-'}</td></tr>
      <tr><td>5일선</td><td>${technical.ma5 != null ? technical.ma5.toLocaleString() : '-'}</td></tr>
      <tr><td>20일선</td><td>${technical.ma20 != null ? technical.ma20.toLocaleString() : '-'}</td></tr>
      <tr><td>60일선</td><td>${technical.ma60 != null ? technical.ma60.toLocaleString() : '-'}</td></tr>
      <tr><td>RSI(14)</td><td>${technical.rsi14 ?? '-'}</td></tr>
      <tr><td>MACD 히스토그램</td><td>${macd.histogram ?? '-'}</td></tr>
      <tr><td>거래량 배율(20일 대비)</td><td>${technical.volume_surge_ratio != null ? technical.volume_surge_ratio + '배' : '-'}</td></tr>
    </table>
  `;
}

function renderSupplyDemand(sd) {
  const el = document.getElementById('supplyDemandSection');
  if (sd.error) {
    el.innerHTML = `<div class="note">${sd.error}</div>`;
    return;
  }
  const fmt = (v) => v != null ? Math.round(v).toLocaleString() + '주' : '-';
  el.innerHTML = `
    <table>
      <tr><td>외국인 연속 순매수/매도일</td><td>${sd.foreigner_streak_days ?? '-'}일</td></tr>
      <tr><td>외국인 순매수 합계</td><td>${fmt(sd.foreigner_net_sum)}</td></tr>
      <tr><td>기관 순매수 합계</td><td>${fmt(sd.institution_net_sum)}</td></tr>
      <tr><td>개인 순매수 합계</td><td>${fmt(sd.individual_net_sum)}</td></tr>
    </table>
    <div class="note">연속일수: 음수=연속 순매도, 양수=연속 순매수</div>
  `;
}

function renderDisclosures(list) {
  const el = document.getElementById('disclosureList');
  if (!list.length) { el.innerHTML = '<div class="note">공시 데이터 없음</div>'; return; }
  el.innerHTML = list.map(item => `
    <div class="disclosure-item">
      <a href="https://dart.fss.or.kr/dsaf001/main.do?rcpNo=${item.rcept_no}" target="_blank">${item.title}</a>
      <span class="date">${item.date}</span>
    </div>
  `).join('');
}

loadCompanyIndex().then(load);
</script>
</body>
</html>
